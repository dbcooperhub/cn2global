        .chat-input-area{padding:16px;border-top:1px solid #e5e7eb}
        .msg{margin-bottom:12px;max-width:85%}
        .msg-user{margin-left:auto;background:#2563eb;color:white;padding:10px 14px;border-radius:16px 16px 4px 16px}

                '查询运费': 'Check shipping rates',

                '请将此地址填写在您的收货地址中，收件人姓名请填写您的用户识别码（注册后在个人中心查看）。': 'Please use this address as your receiving address. Fill in your user ID (found in your account center after registration) as the recipient name.',

            },
            'ja': {

            },

                '您好！欢迎来到CN2Global转运服务。我可以帮您：': '안녕하세요! CN2Global 배송 서비스에 오신 것을 환영합니다. 도와드리겠습니다:',
                '【仓库地址】': '[창고 주소]',
            },
            'vi': {
                '您好！欢迎来到CN2Global转运服务。我可以帮您：': 'Xin chào! Chào mừng đến với dịch vụ vận chuyển CN2Global. Tôi có thể giúp bạn:',
                '【仓库地址】': '[Địa chỉ kho]',
            }
        };
        
        function translateText(text, lang) {
            if (lang === 'none' || !translations[lang]) return null;
            return translations[lang][text] || null;
        }
        
        function addMessage(text, isUser = false) {
            const container = document.getElementById('chatMessages');
            const lang = document.getElementById('translateLang').value;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg ' + (isUser ? 'msg-user' : 'msg-bot');
            
            let html = '<div>' + text.replace(/\n/g, '<br>') + '</div>';
            
            if (!isUser && lang !== 'none') {
                const translated = translateText(text, lang);
                if (translated) {
                    html += '<div class="msg-translated">🌐 ' + translated.replace(/\n/g, '<br>') + '</div>';
                }
            }
            
            msgDiv.innerHTML = html;
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage(text, true);
            input.value = '';
            
            setTimeout(() => {
                const reply = getAutoReply(text);
                addMessage(reply);
            }, 500);
        }
        
        function sendQuickMsg(text) {
            addMessage(text, true);
            setTimeout(() => {
                const reply = getAutoReply(text);
                addMessage(reply);
            }, 500);
        }
        
        function getAutoReply(text) {
            if (text.includes('仓库') || text.includes('地址')) {

            }
            if (text.includes('运费') || text.includes('价格')) {
                return '【运费说明】\n\n📦 空运：首重¥68-118，续重¥28-75/kg\n🚢 海运：首重¥138-228，续重¥4-22/kg\n⚡ 快递：首重¥88-188，续重¥42-108/kg\n🚂 专线：首重¥28-118，续重¥18-65/kg\n\n首重1kg价格，续重每kg加收。具体价格请在首页运费查询查看。';
            }

                return '【禁运品】\n\n❌ 危险品：易燃易爆、压缩气体、腐蚀性物品、毒性物品\n❌ 武器类：枪支弹药、管制刀具\n❌ 药品类：毒品、处方药、含麻黄碱药品\n❌ 食品类：生鲜肉类、植物种子\n❌ 其他：假冒伪劣商品、文物、大量现金\n\n⚠️ 限制物品（可寄但有限制）：\n化妆品≤100ml/件、香水≤100ml、锂电池需安装设备中';
            }
            if (text.includes('操作') || text.includes('流程') || text.includes('怎么')) {
                return '【操作流程】\n\n1️⃣ 注册账号获取专属仓库地址\n2️⃣ 在淘宝/京东等平台购物，填写仓库地址\n3️⃣ 包裹入库后系统通知您\n4️⃣ 申请发货，支付运费\n5️⃣ 坐等收货！\n\n💡 新用户优惠：首单满200减20，优惠码 NEW2026';
            }
            if (text.includes('时效') || text.includes('多久')) {
                return '【运输时效】\n\n✈️ 空运：3-14天（亚洲3-5天，欧美7-14天）\n🚢 海运：8-50天（亚洲8-15天，欧美25-45天）\n⚡ 快递：1-8天（全球1-8天）\n🚂 专线：3-25天（亚洲3-8天，欧美10-25天）\n\n具体时效因目的地而异，请在运费查询页面查看。';
            }
            return '感谢您的咨询！如需更多帮助，请选择上方快捷按钮，或直接输入问题。\n\n您也可以联系我们：\n📱 Telegram: @cn2global\n💬 微信: cn2global\n📧 邮箱: service@cn2g.com';
        }
    </script>
