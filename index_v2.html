                                <div className="border rounded-xl p-6"><h3 className="font-bold text-lg mb-2">📦 国内代收</h3><p className="text-gray-600">支持淘宝、京东、拼多多等电商平台包裹代收，青岛仓库入库</p></div>
                                <div className="border rounded-xl p-6"><h3 className="font-bold text-lg mb-2">✂️ 合箱打包</h3><p className="text-gray-600">免费合箱、加固、去除包装，专业打包服务</p></div>
                                <div className="border rounded-xl p-6"><h3 className="font-bold text-lg mb-2">✈️ 国际物流</h3><p className="text-gray-600">空运、海运、快递、专线四种方式，覆盖全球28+国家</p></div>
                                <div className="border rounded-xl p-6"><h3 className="font-bold text-lg mb-2">📱 全程追踪</h3><p className="text-gray-600">物流轨迹实时更新，多语种展示</p></div>
                                <div className="border rounded-xl p-6"><h3 className="font-bold text-lg mb-2">🛃 清关服务</h3><p className="text-gray-600">专业清关，报税配送一站式</p></div>
                                <div className="border rounded-xl p-6"><h3 className="font-bold text-lg mb-2">💰 支付方式</h3><p className="text-gray-600">微信、支付宝、PayPal、信用卡</p></div>
                            </div>
                        </div>
                    )}
                    
                    {page === 'tracking' && (
                        <div className="pt-20 px-4 py-12 max-w-2xl mx-auto">
                            <h1 className="text-3xl font-bold mb-8 text-center">物流查询</h1>
                            <div className="flex gap-4 mb-8">
                                <input type="text" placeholder="输入运单号" className="flex-1 border rounded-xl p-4"/>
                                <button className="bg-blue-600 text-white px-6 rounded-xl font-semibold">查询</button>
                            </div>
                            <div className="border rounded-xl p-6 text-center text-gray-500">输入运单号查看物流轨迹</div>
                        </div>
                    )}
                    
                    {page === 'price' && (
                        <div className="pt-20 px-4 py-12 max-w-6xl mx-auto">
                            <h1 className="text-3xl font-bold mb-2 text-center">运费查询</h1>
                            <p className="text-center text-gray-500 mb-8">发货地：中国青岛 | 运费包含30元操作费</p>
                            
                            <div className="overflow-x-auto">
                                <table className="w-full border-collapse bg-white rounded-xl shadow-lg">
                                    <thead>
                                        <tr className="bg-blue-600 text-white">
                                            <th className="p-3 text-left">目的地</th>
                                            <th className="p-3 text-center">空运(首重/续重)</th>
                                            <th className="p-3 text-center">海运(首重/续重)</th>
                                            <th className="p-3 text-center">快递(首重/续重)</th>
                                            <th className="p-3 text-center">专线(首重/续重)</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {destinations.map((d, i) => (
                                            <tr key={d} className={i % 2 === 0 ? 'bg-gray-50' : ''}>
                                                <td className="p-3 font-medium">{shippingRates[d].n}</td>
                                                <td className="p-3 text-center text-sm">¥{shippingRates[d].air.b}/{shippingRates[d].air.p}<br/><span className="text-gray-400">{shippingRates[d].d.air}天</span></td>
                                                <td className="p-3 text-center text-sm">¥{shippingRates[d].sea.b}/{shippingRates[d].sea.p}<br/><span className="text-gray-400">{shippingRates[d].d.sea}天</span></td>
                                                <td className="p-3 text-center text-sm">¥{shippingRates[d].express.b}/{shippingRates[d].express.p}<br/><span className="text-gray-400">{shippingRates[d].d.express}天</span></td>
                                                <td className="p-3 text-center text-sm">¥{shippingRates[d].line.b}/{shippingRates[d].line.p}<br/><span className="text-gray-400">{shippingRates[d].d.line}天</span></td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            <p className="text-sm text-gray-500 mt-4 text-center">* 首重1kg价格 / 续重每kg价格（单位：人民币）</p>
                        </div>
                    )}
                    
                    <footer className="bg-gray-900 text-gray-400 py-12">
                        <div className="max-w-6xl mx-auto px-4 text-center">
                            <p className="text-2xl font-bold text-white mb-4">CN2Global</p>
                            <p className="text-sm mb-4">中国青岛 | 专业国际集运转运</p>
                            <p className="text-sm">{t.footer.c}</p>
                        </div>
                    </footer>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
    </script>
</body>
</html>
