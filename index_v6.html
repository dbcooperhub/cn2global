<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CN2Global - 专业国际集运转运服务</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ========================================
   CN2Global v6 - Premium Design System
   ======================================== */

/* CSS Variables - Design Tokens */
:root {
  /* Colors - Muted & Professional */
  --color-primary: #0066FF;
  --color-primary-dark: #0052CC;
  --color-primary-light: #E6F0FF;
  --color-accent: #00D4AA;
  --color-success: #10B981;
  --color-warning: #F59E0B;
  --color-error: #EF4444;
  
  /* Neutrals - Cool Gray Scale */
  --color-bg: #FFFFFF;
  --color-bg-secondary: #F8FAFC;
  --color-bg-tertiary: #F1F5F9;
  --color-border: #E2E8F0;
  --color-border-light: #F1F5F9;
  --color-text-primary: #0F172A;
  --color-text-secondary: #475569;
  --color-text-tertiary: #94A3B8;
  --color-text-inverse: #FFFFFF;
  
  /* Typography */
  --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-size-xs: 0.75rem;
  --font-size-sm: 0.875rem;
  --font-size-base: 1rem;
  --font-size-lg: 1.125rem;
  --font-size-xl: 1.25rem;
  --font-size-2xl: 1.5rem;
  --font-size-3xl: 1.875rem;
  --font-size-4xl: 2.25rem;
  --font-size-5xl: 3rem;
  --font-size-6xl: 3.75rem;
  
  /* Spacing */
  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;
  --space-10: 2.5rem;
  --space-12: 3rem;
  --space-16: 4rem;
  --space-20: 5rem;
  --space-24: 6rem;
  
  /* Border Radius */
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --radius-full: 9999px;
  
  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.08);
  --shadow-xl: 0 24px 48px rgba(0,0,0,0.1);
  
  /* Transitions */
  --transition-fast: 150ms ease;
  --transition-base: 200ms ease;
  --transition-slow: 300ms ease;
  --transition-slower: 400ms ease;
  
  /* Layout */
  --container-max: 1200px;
  --container-narrow: 800px;
  --nav-height: 72px;
}

/* Reset & Base */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-family);
  font-size: var(--font-size-base);
  line-height: 1.6;
  color: var(--color-text-primary);
  background: var(--color-bg);
  overflow-x: hidden;
}

/* Typography */
h1, h2, h3, h4, h5, h6 {
  font-weight: 600;
  line-height: 1.2;
  letter-spacing: -0.02em;
}

h1 { font-size: var(--font-size-5xl); font-weight: 700; }
h2 { font-size: var(--font-size-4xl); }
h3 { font-size: var(--font-size-2xl); }
h4 { font-size: var(--font-size-xl); }

p { color: var(--color-text-secondary); }

a {
  color: var(--color-primary);
  text-decoration: none;
  transition: color var(--transition-fast);
}

a:hover { color: var(--color-primary-dark); }

/* Container */
.container {
  width: 100%;
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 0 var(--space-6);
}

.container-narrow {
  max-width: var(--container-narrow);
}

/* ========================================
   Navigation
   ======================================== */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--nav-height);
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--color-border-light);
  z-index: 1000;
  transition: all var(--transition-base);
}

.nav-inner {
  max-width: var(--container-max);
  margin: 0 auto;
  padding: 0 var(--space-6);
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.nav-logo {
  font-size: var(--font-size-xl);
  font-weight: 700;
  color: var(--color-text-primary);
  letter-spacing: -0.03em;
}

.nav-links {
  display: flex;
  align-items: center;
  gap: var(--space-8);
}

.nav-link {
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-text-secondary);
  transition: color var(--transition-fast);
  cursor: pointer;
}

.nav-link:hover {
  color: var(--color-text-primary);
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

/* Language Switcher */
.lang-switch {
  display: flex;
  background: var(--color-bg-secondary);
  border-radius: var(--radius-full);
  padding: 3px;
}

.lang-btn {
  padding: 6px 14px;
  font-size: var(--font-size-xs);
  font-weight: 500;
  color: var(--color-text-tertiary);
  background: transparent;
  border: none;
  border-radius: var(--radius-full);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.lang-btn.active {
  background: var(--color-bg);
  color: var(--color-text-primary);
  box-shadow: var(--shadow-sm);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: 10px 20px;
  font-size: var(--font-size-sm);
  font-weight: 500;
  border-radius: var(--radius-md);
  border: none;
  cursor: pointer;
  transition: all var(--transition-base);
  white-space: nowrap;
}

.btn-primary {
  background: var(--color-text-primary);
  color: var(--color-text-inverse);
}

.btn-primary:hover {
  background: #1E293B;
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--color-bg-secondary);
  color: var(--color-text-primary);
  border: 1px solid var(--color-border);
}

.btn-secondary:hover {
  background: var(--color-bg-tertiary);
  border-color: var(--color-text-tertiary);
}

.btn-ghost {
  background: transparent;
  color: var(--color-text-secondary);
}

.btn-ghost:hover {
  background: var(--color-bg-secondary);
  color: var(--color-text-primary);
}

/* ========================================
   Hero Section
   ======================================== */
.hero {
  min-height: 100vh;
  display: flex;
  align-items: center;
  padding: calc(var(--nav-height) + var(--space-16)) 0 var(--space-16);
  background: linear-gradient(180deg, var(--color-bg) 0%, var(--color-bg-secondary) 100%);
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(0, 102, 255, 0.03) 0%, transparent 70%);
  pointer-events: none;
}

.hero-inner {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-16);
  align-items: center;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 6px 14px;
  background: var(--color-primary-light);
  color: var(--color-primary);
  font-size: var(--font-size-xs);
  font-weight: 600;
  border-radius: var(--radius-full);
  margin-bottom: var(--space-6);
}

.hero-title {
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 700;
  color: var(--color-text-primary);
  line-height: 1.1;
  margin-bottom: var(--space-6);
  letter-spacing: -0.03em;
}

.hero-subtitle {
  font-size: var(--font-size-lg);
  color: var(--color-text-secondary);
  line-height: 1.7;
  margin-bottom: var(--space-8);
  max-width: 480px;
}

.hero-actions {
  display: flex;
  gap: var(--space-4);
  margin-bottom: var(--space-12);
}

.hero-stats {
  display: flex;
  gap: var(--space-10);
}

.stat-item {
  text-align: left;
}

.stat-value {
  font-size: var(--font-size-3xl);
  font-weight: 700;
  color: var(--color-text-primary);
  letter-spacing: -0.02em;
}

.stat-label {
  font-size: var(--font-size-sm);
  color: var(--color-text-tertiary);
  margin-top: var(--space-1);
}

/* Hero Card */
.hero-card {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--space-8);
  box-shadow: var(--shadow-lg);
}

.card-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-6);
}

.card-icon {
  width: 40px;
  height: 40px;
  background: var(--color-primary-light);
  border-radius: var(--radius-md);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--font-size-lg);
}

.card-title {
  font-size: var(--font-size-lg);
  font-weight: 600;
}

.card-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-4);
  margin-bottom: var(--space-4);
}

.form-group {
  margin-bottom: 0;
}

.form-label {
  display: block;
  font-size: var(--font-size-xs);
  font-weight: 500;
  color: var(--color-text-secondary);
  margin-bottom: var(--space-2);
}

.form-input, .form-select {
  width: 100%;
  padding: 12px 14px;
  font-size: var(--font-size-sm);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  background: var(--color-bg);
  color: var(--color-text-primary);
  transition: all var(--transition-fast);
}

.form-input:focus, .form-select:focus {
  outline: none;
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
}

.phone-group {
  display: flex;
  gap: var(--space-2);
}

.phone-group select {
  width: 100px;
  flex-shrink: 0;
}

.phone-group input {
  flex: 1;
}

.calc-result {
  background: var(--color-bg-secondary);
  border-radius: var(--radius-lg);
  padding: var(--space-6);
  text-align: center;
  margin-top: var(--space-4);
}

.calc-price {
  font-size: var(--font-size-4xl);
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: -0.02em;
}

.calc-detail {
  font-size: var(--font-size-sm);
  color: var(--color-text-tertiary);
  margin-top: var(--space-2);
}

/* ========================================
   Shopping Platforms
   ======================================== */
.shop-section {
  padding: var(--space-16) 0;
  background: var(--color-bg);
}

.section-header {
  text-align: center;
  margin-bottom: var(--space-12);
}

.section-label {
  font-size: var(--font-size-xs);
  font-weight: 600;
  color: var(--color-primary);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: var(--space-3);
}

.section-title {
  font-size: var(--font-size-4xl);
  color: var(--color-text-primary);
  margin-bottom: var(--space-4);
}

.section-subtitle {
  font-size: var(--font-size-lg);
  color: var(--color-text-secondary);
  max-width: 600px;
  margin: 0 auto;
}

.shop-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: var(--space-4);
}

.shop-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: var(--space-6);
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: all var(--transition-base);
  text-decoration: none;
}

.shop-card:hover {
  background: var(--color-bg);
  border-color: var(--color-primary);
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
}

.shop-icon {
  font-size: 32px;
  margin-bottom: var(--space-3);
}

.shop-name {
  font-size: var(--font-size-sm);
  font-weight: 500;
  color: var(--color-text-primary);
}

/* ========================================
   Features Section
   ======================================== */
.features {
  padding: var(--space-24) 0;
  background: var(--color-bg-secondary);
}

.features-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-6);
}

.feature-card {
  background: var(--color-bg);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-xl);
  padding: var(--space-8);
  transition: all var(--transition-base);
}

.feature-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: transparent;
}

.feature-icon {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--color-primary-light), #DBEAFE);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  margin-bottom: var(--space-5);
}

.feature-title {
  font-size: var(--font-size-lg);
  font-weight: 600;
  color: var(--color-text-primary);
  margin-bottom: var(--space-3);
}

.feature-desc {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  line-height: 1.7;
}

/* ========================================
   Process Section
   ======================================== */
.process {
  padding: var(--space-24) 0;
  background: var(--color-bg);
}

.process-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--space-6);
}

.process-card {
  text-align: center;
  padding: var(--space-6);
  position: relative;
}

.process-card::after {
  content: '';
  position: absolute;
  top: 40px;
  right: -30px;
  width: 60px;
  height: 2px;
  background: var(--color-border);
}

.process-card:last-child::after {
  display: none;
}

.process-num {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--color-text-primary), #334155);
  color: var(--color-text-inverse);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--font-size-2xl);
  font-weight: 700;
  margin: 0 auto var(--space-5);
}

.process-title {
  font-size: var(--font-size-lg);
  font-weight: 600;
  color: var(--color-text-primary);
  margin-bottom: var(--space-2);
}

.process-desc {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}

/* ========================================
   Warehouse Section
   ======================================== */
.warehouse {
  padding: var(--space-16) 0;
  background: var(--color-bg-secondary);
}

.warehouse-box {
  background: var(--color-bg);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: var(--space-8);
}

.warehouse-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-6);
}

.warehouse-icon {
  width: 48px;
  height: 48px;
  background: var(--color-accent);
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}

.warehouse-title {
  font-size: var(--font-size-xl);
  font-weight: 600;
}

.warehouse-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-6);
}

.warehouse-item {
  background: var(--color-bg-secondary);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
}

.warehouse-label {
  font-size: var(--font-size-xs);
  font-weight: 600;
  color: var(--color-text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: var(--space-3);
}

.warehouse-text {
  font-size: var(--font-size-sm);
  color: var(--color-text-primary);
  line-height: 1.8;
}

/* ========================================
   Regions Section
   ======================================== */
.regions {
  padding: var(--space-24) 0;
  background: var(--color-bg);
}

.regions-grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: var(--space-3);
}

.region-tag {
  padding: 10px 18px;
  background: var(--color-bg-secondary);
  border: 1px solid var(--color-border-light);
  border-radius: var(--radius-full);
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  transition: all var(--transition-fast);
}

.region-tag:hover {
  background: var(--color-bg);
  border-color: var(--color-primary);
  color: var(--color-primary);
}

/* ========================================
   Tips Section
   ======================================== */
.tips {
  padding: var(--space-16) 0;
  background: var(--color-bg-secondary);
}

.tips-box {
  background: linear-gradient(135deg, #FEF3C7, #FDE68A);
  border-radius: var(--radius-xl);
  padding: var(--space-8);
}

.tips-header {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-6);
}

.tips-icon {
  font-size: 24px;
}

.tips-title {
  font-size: var(--font-size-xl);
  font-weight: 600;
  color: #92400E;
}

.tips-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: var(--space-4);
}

.tip-item {
  display: flex;
  align-items: flex-start;
  gap: var(--space-3);
  font-size: var(--font-size-sm);
  color: #78350F;
  line-height: 1.6;
}

.tip-icon {
  flex-shrink: 0;
  margin-top: 2px;
}

/* ========================================
   Footer
   ======================================== */
.footer {
  background: var(--color-text-primary);
  color: var(--color-text-inverse);
  padding: var(--space-16) 0 var(--space-8);
}

.footer-grid {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: var(--space-12);
  margin-bottom: var(--space-12);
}

.footer-brand {
  font-size: var(--font-size-2xl);
  font-weight: 700;
  margin-bottom: var(--space-4);
}

.footer-desc {
  font-size: var(--font-size-sm);
  color: var(--color-text-tertiary);
  line-height: 1.7;
  margin-bottom: var(--space-6);
}

.footer-title {
  font-size: var(--font-size-sm);
  font-weight: 600;
  color: var(--color-text-inverse);
  margin-bottom: var(--space-4);
}

.footer-links {
  list-style: none;
}

.footer-links li {
  margin-bottom: var(--space-3);
}

.footer-links a {
  font-size: var(--font-size-sm);
  color: var(--color-text-tertiary);
  transition: color var(--transition-fast);
}

.footer-links a:hover {
  color: var(--color-text-inverse);
}

.footer-bottom {
  padding-top: var(--space-8);
  border-top: 1px solid rgba(255,255,255,0.1);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.footer-copy {
  font-size: var(--font-size-sm);
  color: var(--color-text-tertiary);
}

.footer-payments {
  display: flex;
  gap: var(--space-4);
  font-size: 24px;
  opacity: 0.6;
}

/* ========================================
   Customer Service
   ======================================== */
.cs-trigger {
  position: fixed;
  bottom: var(--space-8);
  right: var(--space-8);
  width: 56px;
  height: 56px;
  background: var(--color-text-primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--shadow-xl);
  transition: all var(--transition-base);
  z-index: 1000;
  border: none;
  font-size: 24px;
}

.cs-trigger:hover {
  transform: scale(1.05);
  background: #1E293B;
}

.cs-trigger .online-dot {
  position: absolute;
  top: 4px;
  right: 4px;
  width: 12px;
  height: 12px;
  background: var(--color-success);
  border-radius: 50%;
  border: 2px solid var(--color-bg);
}

.cs-window {
  position: fixed;
  bottom: calc(var(--space-8) + 70px);
  right: var(--space-8);
  width: 380px;
  height: 520px;
  background: var(--color-bg);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-xl);
  z-index: 1000;
  display: none;
  flex-direction: column;
  overflow: hidden;
}

.cs-window.open {
  display: flex;
}

.cs-header {
  background: var(--color-text-primary);
  color: var(--color-text-inverse);
  padding: var(--space-5);
}

.cs-header-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-3);
}

.cs-header-title {
  font-size: var(--font-size-base);
  font-weight: 600;
}

.cs-close {
  background: none;
  border: none;
  color: var(--color-text-inverse);
  font-size: 20px;
  cursor: pointer;
  opacity: 0.7;
  transition: opacity var(--transition-fast);
}

.cs-close:hover {
  opacity: 1;
}

.cs-lang-row {
  display: flex;
  gap: var(--space-2);
  flex-wrap: wrap;
}

.cs-lang-btn {
  padding: 4px 10px;
  background: rgba(255,255,255,0.1);
  border: none;
  border-radius: var(--radius-full);
  color: rgba(255,255,255,0.7);
  font-size: var(--font-size-xs);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.cs-lang-btn.active {
  background: var(--color-text-inverse);
  color: var(--color-text-primary);
}

.cs-messages {
  flex: 1;
  padding: var(--space-4);
  overflow-y: auto;
  background: var(--color-bg-secondary);
}

.cs-message {
  display: flex;
  gap: var(--space-3);
  margin-bottom: var(--space-4);
}

.cs-message.bot .cs-avatar {
  background: var(--color-primary);
  color: var(--color-text-inverse);
}

.cs-message.user {
  flex-direction: row-reverse;
}

.cs-avatar {
  width: 32px;
  height: 32px;
  background: var(--color-bg-tertiary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  flex-shrink: 0;
}

.cs-bubble {
  max-width: 75%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: var(--font-size-sm);
  line-height: 1.5;
}

.cs-message.bot .cs-bubble {
  background: var(--color-bg);
  color: var(--color-text-primary);
  border-bottom-left-radius: 4px;
}

.cs-message.user .cs-bubble {
  background: var(--color-primary);
  color: var(--color-text-inverse);
  border-bottom-right-radius: 4px;
}

.cs-quick {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-2);
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--color-border-light);
}

.cs-quick-btn {
  padding: 6px 12px;
  background: var(--color-bg-tertiary);
  border: none;
  border-radius: var(--radius-full);
  font-size: var(--font-size-xs);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.cs-quick-btn:hover {
  background: var(--color-primary-light);
  color: var(--color-primary);
}

.cs-input-area {
  padding: var(--space-3) var(--space-4);
  border-top: 1px solid var(--color-border-light);
  display: flex;
  gap: var(--space-3);
}

.cs-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  font-size: var(--font-size-sm);
}

.cs-input:focus {
  outline: none;
  border-color: var(--color-primary);
}

.cs-send {
  width: 40px;
  height: 40px;
  background: var(--color-primary);
  border: none;
  border-radius: 50%;
  color: var(--color-text-inverse);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: all var(--transition-fast);
}

.cs-send:hover {
  background: var(--color-primary-dark);
}

/* ========================================
   Modal
   ======================================== */
.modal-overlay {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  padding: var(--space-6);
}

.modal-overlay.open {
  display: flex;
}

.modal {
  background: var(--color-bg);
  border-radius: var(--radius-xl);
  width: 100%;
  max-width: 420px;
  max-height: 90vh;
  overflow-y: auto;
}

.modal-header {
  padding: var(--space-6);
  border-bottom: 1px solid var(--color-border-light);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title {
  font-size: var(--font-size-xl);
  font-weight: 600;
}

.modal-close {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--color-bg-secondary);
  border: none;
  border-radius: 50%;
  font-size: 18px;
  color: var(--color-text-secondary);
  cursor: pointer;
  transition: all var(--transition-fast);
}

.modal-close:hover {
  background: var(--color-bg-tertiary);
  color: var(--color-text-primary);
}

.modal-body {
  padding: var(--space-6);
}

/* Social Login */
.social-login {
  display: flex;
  flex-direction: column;
  gap: var(--space-3);
}

.social-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-3);
  width: 100%;
  padding: 12px;
  border-radius: var(--radius-md);
  font-size: var(--font-size-sm);
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition-fast);
  border: 1px solid var(--color-border);
  background: var(--color-bg);
}

.social-btn:hover {
  background: var(--color-bg-secondary);
  transform: translateY(-1px);
}

.social-btn.google { color: #333; }
.social-btn.facebook { background: #1877F2; color: #fff; border-color: #1877F2; }
.social-btn.twitter { background: #000; color: #fff; border-color: #000; }

.divider {
  display: flex;
  align-items: center;
  margin: var(--space-5) 0;
  color: var(--color-text-tertiary);
  font-size: var(--font-size-sm);
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--color-border);
}

.divider::before { margin-right: var(--space-4); }
.divider::after { margin-left: var(--space-4); }

.form-group {
  margin-bottom: var(--space-4);
}

.modal-footer {
  padding: var(--space-4) var(--space-6);
  border-top: 1px solid var(--color-border-light);
  text-align: center;
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
}

.modal-footer a {
  color: var(--color-primary);
  font-weight: 500;
}

/* ========================================
   Toast
   ======================================== */
.toast {
  position: fixed;
  top: calc(var(--nav-height) + var(--space-4));
  right: var(--space-4);
  padding: 14px 20px;
  background: var(--color-bg);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-lg);
  z-index: 3000;
  display: flex;
  align-items: center;
  gap: var(--space-3);
  font-size: var(--font-size-sm);
  animation: slideIn 0.3s ease;
}

.toast.success { border-left: 4px solid var(--color-success); }
.toast.error { border-left: 4px solid var(--color-error); }

@keyframes slideIn {
  from {
    opacity: 0;
    transform: translateX(20px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

/* ========================================
   Utility Classes
   ======================================== */
.hidden { display: none !important; }

/* ========================================
   Responsive Design
   ======================================== */

    grid-template-columns: 1fr;
    gap: var(--space-10);
  }
  
  .shop-grid {
    grid-template-columns: repeat(4, 1fr);
  }
  
  .features-grid {
    grid-template-columns: repeat(2, 1fr);
  }
  
  .process-grid {

  }

  .warehouse-grid {

  }
  
  .tips-grid {

  }
  
  .footer-grid {
    grid-template-columns: 1fr;
  }

  }
  
  .hero-stats {

    gap: var(--space-6);
  }
  
  .hero-actions {
    flex-direction: column;
  }

    width: 100%;
  }
