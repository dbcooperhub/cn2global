<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CN2Global - 中国好物寄全球 | 专业国际集运转运</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ========================================
   CN2Global v12 - Premium Multi-Language
   ======================================== */
:root {
  --primary: #2563EB;
  --primary-dark: #1D4ED8;
  --orange: #F97316;
  --orange-dark: #EA580C;
  --green: #10B981;
  --red: #EF4444;
  --yellow: #F59E0B;
  --gray-50: #F9FAFB;
  --gray-100: #F3F4F6;
  --gray-200: #E5E7EB;
  --gray-300: #D1D5DB;
  --gray-400: #9CA3AF;
  --gray-500: #6B7280;
  --gray-600: #4B5563;
  --gray-700: #374151;
  --gray-800: #1F2937;
  --gray-900: #111827;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-md: 0 4px 6px rgba(0,0,0,0.07);
  --shadow-lg: 0 10px 25px rgba(0,0,0,0.1);
  --shadow-xl: 0 20px 40px rgba(0,0,0,0.15);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', 'Noto Sans SC', 'Noto Sans KR', 'Noto Sans JP', sans-serif;
  color: var(--gray-800);
  line-height: 1.6;
  background: #fff;
  overflow-x: hidden;
}

a { color: inherit; text-decoration: none; }
ul { list-style: none; }
img { max-width: 100%; }

/* Language Selector */
.lang-selector {
  position: relative;
  display: inline-block;
}

.lang-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 14px;
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--gray-700);
  cursor: pointer;
  transition: all 0.2s;
}

.lang-btn:hover {
  background: var(--gray-200);
  border-color: var(--gray-300);
}

.lang-btn i { font-size: 0.75rem; }

.lang-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  margin-top: 4px;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  min-width: 160px;
  z-index: 1000;
  display: none;
  overflow: hidden;
}

.lang-dropdown.show { display: block; }

.lang-option {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 16px;
  font-size: 0.875rem;
  color: var(--gray-700);
  cursor: pointer;
  transition: background 0.15s;
}

.lang-option:hover { background: var(--gray-50); }
.lang-option.active { background: var(--primary); color: #fff; }
.lang-option .flag { font-size: 1.1rem; }

/* Container */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 48px;
  padding: 14px 28px;
  border-radius: 12px;
  font-size: 0.95rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-orange {
  background: var(--orange);
  color: #fff;
}

.btn-orange:hover {
  background: var(--orange-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(249, 115, 22, 0.35);
}

.btn-blue {
  background: var(--primary);
  color: #fff;
}

.btn-blue:hover {
  background: var(--primary-dark);
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(37, 99, 235, 0.35);
}

.btn-outline {
  background: transparent;
  border: 2px solid var(--primary);
  color: var(--primary);
}

.btn-outline:hover {
  background: var(--primary);
  color: #fff;
}

/* Navigation */
.nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 72px;
  background: rgba(255, 255, 255, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  z-index: 1000;
  border-bottom: 1px solid var(--gray-100);
}

.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 24px;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-logo-icon {
  width: 40px;
  height: 40px;
  background: linear-gradient(135deg, var(--primary), #3B82F6);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 1.2rem;
  font-weight: 800;
}

.nav-logo-text {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--primary);
  letter-spacing: -0.02em;
}

.nav-slogan {
  font-size: 0.75rem;
  color: var(--gray-500);
  padding-left: 16px;
  border-left: 1px solid var(--gray-200);
}

.nav-links {
  display: none;
  align-items: center;
  gap: 8px;
}

@media (min-width: 1024px) {
  .nav-links { display: flex; }
}

.nav-link {
  padding: 10px 16px;
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--gray-600);
  border-radius: 8px;
  transition: all 0.2s;
}

.nav-link:hover, .nav-link.active {
  color: var(--primary);
  background: rgba(37, 99, 235, 0.08);
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-cta {
  display: none;
  padding: 10px 20px;
  background: var(--orange);
  color: #fff;
  border-radius: 8px;
  font-size: 0.875rem;
  font-weight: 600;
}

@media (min-width: 768px) {
  .nav-cta { display: inline-flex; }
}

.hamburger {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 5px;
  width: 40px;
  height: 40px;
  cursor: pointer;
}

@media (min-width: 1024px) {
  .hamburger { display: none; }
}

.hamburger span {
  display: block;
  width: 24px;
  height: 2px;
  background: var(--gray-700);
  border-radius: 2px;
  transition: all 0.3s;
}

/* Mobile Menu */
.mobile-menu {
  position: fixed;
  top: 72px;
  left: 0;
  right: 0;
  bottom: 0;
  background: #fff;
  z-index: 999;
  padding: 24px;
  display: none;
  overflow-y: auto;
}

.mobile-menu.active { display: block; }

.mobile-menu-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--gray-100);
}

.mobile-menu a {
  display: block;
  padding: 16px 0;
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--gray-800);
  border-bottom: 1px solid var(--gray-100);
}

.mobile-menu .btn {
  width: 100%;
  margin-top: 16px;
}

/* Hero Section */
.hero {
  padding: 120px 0 80px;
  background: linear-gradient(180deg, #fff 0%, var(--gray-50) 100%);
  position: relative;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 80%;
  height: 150%;
  background: radial-gradient(ellipse, rgba(37, 99, 235, 0.08) 0%, transparent 70%);
  pointer-events: none;
}

.hero-grid {
  display: grid;
  gap: 48px;
  align-items: center;
  position: relative;
}

@media (min-width: 1024px) {
  .hero-grid { grid-template-columns: 1fr 1fr; }
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: linear-gradient(135deg, var(--orange), #FB923C);
  color: #fff;
  border-radius: 50px;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 20px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.02); }
}

.hero h1 {
  font-size: clamp(2rem, 5vw, 3.2rem);
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 20px;
  color: var(--gray-900);
  letter-spacing: -0.03em;
}

.hero h1 span {
  background: linear-gradient(135deg, var(--primary), #3B82F6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero-sub {
  font-size: 1.15rem;
  color: var(--gray-500);
  margin-bottom: 32px;
  max-width: 500px;
}

.hero-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 36px;
}

.hero-stat {
  background: #fff;
  border: 1px solid var(--gray-100);
  border-radius: 16px;
  padding: 20px;
  text-align: center;
  transition: all 0.3s;
}

.hero-stat:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
  border-color: var(--primary);
}

.hero-stat-icon {
  width: 52px;
  height: 52px;
  background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(59, 130, 246, 0.05));
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 12px;
  font-size: 1.4rem;
  color: var(--primary);
}

.hero-stat-value {
  font-size: 1.8rem;
  font-weight: 700;
  color: var(--gray-900);
}

.hero-stat-label {
  font-size: 0.8rem;
  color: var(--gray-500);
  margin-top: 4px;
}

.hero-btns {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

@media (min-width: 640px) {
  .hero-btns { flex-direction: row; }
}

.hero-btns .btn { flex: 1; }

/* Calculator Card */
.calc-card {
  background: #fff;
  border-radius: 24px;
  padding: 32px;
  box-shadow: var(--shadow-xl);
  border: 1px solid var(--gray-100);
}

.calc-card h3 {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.calc-card h3 i { color: var(--primary); }

.calc-form { display: grid; gap: 16px; }

.calc-row {
  display: grid;
  gap: 16px;
}

@media (min-width: 640px) {
  .calc-row { grid-template-columns: 1fr 1fr; }
}

.calc-group label {
  display: block;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--gray-600);
  margin-bottom: 8px;
}

.calc-group input,
.calc-group select {
  width: 100%;
  height: 52px;
  padding: 0 16px;
  border: 1.5px solid var(--gray-200);
  border-radius: 10px;
  font-size: 0.95rem;
  transition: all 0.2s;
}

.calc-group input:focus,
.calc-group select:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

.calc-result {
  background: linear-gradient(135deg, var(--gray-50), #F0F9FF);
  border-radius: 16px;
  padding: 24px;
  text-align: center;
  margin-top: 20px;
  display: none;
}

.calc-result.show { display: block; }

.calc-price {
  font-size: 2.8rem;
  font-weight: 800;
  background: linear-gradient(135deg, var(--primary), #3B82F6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.calc-detail {
  font-size: 0.9rem;
  color: var(--gray-500);
  margin-top: 8px;
}

.calc-note {
  font-size: 0.8rem;
  color: var(--gray-400);
  margin-top: 12px;
}

/* Section Styles */
.section {
  padding: 90px 0;
}

@media (min-width: 768px) {
  .section { padding: 110px 0; }
}

.section-light { background: var(--gray-50); }

.section-header {
  text-align: center;
  max-width: 700px;
  margin: 0 auto 60px;
}

.section-label {
  display: inline-block;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--orange);
  text-transform: uppercase;
  letter-spacing: 0.15em;
  margin-bottom: 12px;
}

.section-title {
  font-size: clamp(1.75rem, 4vw, 2.5rem);
  font-weight: 800;
  margin-bottom: 16px;
  color: var(--gray-900);
  letter-spacing: -0.02em;
}

.section-sub {
  font-size: 1.1rem;
  color: var(--gray-500);
}

/* Features Grid */
.features-grid {
  display: grid;
  gap: 24px;
}

@media (min-width: 768px) {
  .features-grid { grid-template-columns: repeat(2, 1fr); }
}

@media (min-width: 1024px) {
  .features-grid { grid-template-columns: repeat(4, 1fr); }
}

.feature-card {
  background: #fff;
  border: 1px solid var(--gray-100);
  border-radius: 20px;
  padding: 32px;
  text-align: center;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}

.feature-card:hover {
  transform: translateY(-8px);
  box-shadow: var(--shadow-xl);
  border-color: var(--primary);
}

.feature-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(59, 130, 246, 0.05));
  border-radius: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 1.8rem;
  color: var(--primary);
  transition: all 0.3s;
}

.feature-card:hover .feature-icon {
  background: linear-gradient(135deg, var(--primary), #3B82F6);
  color: #fff;
}

.feature-card h4 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 10px;
  color: var(--gray-900);
}

.feature-card p {
  font-size: 0.925rem;
  color: var(--gray-500);
  line-height: 1.7;
}

/* Process Steps */
.process-steps {
  display: grid;
  gap: 32px;
  margin-top: 50px;
  position: relative;
}

@media (min-width: 768px) {
  .process-steps {
    grid-template-columns: repeat(2, 1fr);
    gap: 40px;
  }
}

@media (min-width: 1024px) {
  .process-steps {
    grid-template-columns: repeat(4, 1fr);
    gap: 30px;
  }
}

.process-step {
  text-align: center;
  position: relative;
}

@media (min-width: 1024px) {
  .process-step::after {
    content: '';
    position: absolute;
    top: 40px;
    right: -30px;
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, var(--primary), var(--gray-200));
  }
  
  .process-step:last-child::after { display: none; }
}

.process-num {
  width: 56px;
  height: 56px;
  background: linear-gradient(135deg, var(--orange), #FB923C);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 1.4rem;
  font-weight: 800;
  color: #fff;
}

.process-icon {
  width: 80px;
  height: 80px;
  background: #fff;
  border: 2px solid var(--primary);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 1.8rem;
  color: var(--primary);
}

.process-step h4 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 10px;
}

.process-step p {
  font-size: 0.9rem;
  color: var(--gray-500);
}

/* Popular Brands Section - Like Shipito */
.brands-section {
  background: linear-gradient(180deg, #fff 0%, var(--gray-50) 100%);
  padding: 100px 0;
}

.brands-header {
  text-align: center;
  margin-bottom: 50px;
}

.brands-title {
  font-size: clamp(1.5rem, 4vw, 2rem);
  font-weight: 800;
  margin-bottom: 12px;
}

.brands-sub {
  font-size: 1.1rem;
  color: var(--gray-500);
}

.brands-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  max-width: 1100px;
  margin: 0 auto;
}

@media (min-width: 640px) {
  .brands-grid { grid-template-columns: repeat(3, 1fr); }
}

@media (min-width: 900px) {
  .brands-grid { grid-template-columns: repeat(5, 1fr); }
}

.brand-card {
  background: #fff;
  border: 1px solid var(--gray-100);
  border-radius: 16px;
  padding: 24px 16px;
  text-align: center;
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 140px;
  justify-content: center;
}

.brand-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-xl);
  border-color: var(--primary);
}

.brand-logo {
  width: 56px;
  height: 56px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  font-size: 1.5rem;
  font-weight: 800;
  color: #fff;
}

.brand-card span {
  font-size: 0.875rem;
  font-weight: 600;
  color: var(--gray-700);
}

/* China Brand Colors */
.brand-taobao { background: linear-gradient(135deg, #FF5000, #FF6A00); }
.brand-tmall { background: linear-gradient(135deg, #FF6A00, #FF8A00); }
.brand-jd { background: linear-gradient(135deg, #E1251B, #F7353D); }
.brand-pinduoduo { background: linear-gradient(135deg, #E1251B, #FF4040); }
.brand-1688 { background: linear-gradient(135deg, #1684E0, #2B9FE8); }
.brand-douyin { background: linear-gradient(135deg, #161823, #2F2F2F); }
.brand-vip { background: linear-gradient(135deg, #D4374E, #E84A60); }
.brand-suning { background: linear-gradient(135deg, #FA7000, #FF8800); }
.brand-dewu { background: linear-gradient(135deg, #FFE000, #FFEA00); color: #333 !important; }
.brand-xiaohongshu { background: linear-gradient(135deg, #FE2C55, #FF4D6D); }
.brand-baidu { background: linear-gradient(135deg, #2932E1, #4E6EF2); }
.brand-netEase { background: linear-gradient(135deg, #DB3434, #E84A4A); }
.brand-alipay { background: linear-gradient(135deg, #1677FF, #4090EF); }
.brand-wechat { background: linear-gradient(135deg, #07C160, #09D16D); }
.brand-bilibili { background: linear-gradient(135deg, #00A1D6, #00BAD6); }

/* Address Section */
.address-section {
  background: var(--gray-50);
  padding: 90px 0;
}

.address-grid {
  display: grid;
  gap: 24px;
  max-width: 900px;
  margin: 0 auto;
}

@media (min-width: 768px) {
  .address-grid { grid-template-columns: 1fr 1fr; }
}

.address-card {
  background: #fff;
  border-radius: 20px;
  padding: 28px;
  position: relative;
  box-shadow: var(--shadow-md);
}

.address-card h4 {
  font-size: 1rem;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.address-card h4 i { color: var(--primary); }

.address-card p {
  font-size: 0.95rem;
  color: var(--gray-700);
  line-height: 1.8;
  padding-left: 4px;
}

.address-card .copy-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  min-width: 110px;
  height: 38px;
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.2s;
}

.address-card .copy-btn:hover {
  background: var(--primary-dark);
}

.address-card .copy-btn.copied {
  background: var(--green);
}

/* Shipping Rates Table */
.rates-section { padding: 100px 0; }

.rates-table {
  background: #fff;
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--gray-100);
  box-shadow: var(--shadow-lg);
}

.rates-header {
  display: none;
  background: var(--gray-50);
  padding: 18px 24px;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

@media (min-width: 768px) {
  .rates-header {
    display: grid;
    grid-template-columns: 2fr 1.5fr 1.5fr 1fr 100px;
    gap: 16px;
  }
}

.rates-row {
  display: grid;
  grid-template-columns: 2fr 1fr 100px;
  gap: 12px;
  padding: 18px 24px;
  border-bottom: 1px solid var(--gray-100);
  font-size: 0.9rem;
  align-items: center;
}

@media (min-width: 768px) {
  .rates-row {
    grid-template-columns: 2fr 1.5fr 1.5fr 1fr 100px;
  }
}

.rates-row:last-child { border-bottom: none; }
.rates-row:hover { background: var(--gray-50); }

.rates-country {
  display: flex;
  align-items: center;
  gap: 12px;
}

.rates-flag {
  width: 28px;
  height: 20px;
  border-radius: 4px;
  background: var(--gray-200);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.65rem;
  font-weight: 700;
}

.rates-name { font-weight: 600; }

.rates-time { color: var(--gray-600); font-size: 0.85rem; }
.rates-channel { color: var(--gray-500); font-size: 0.85rem; }
.rates-price { font-weight: 700; color: var(--primary); font-size: 1rem; }
.rates-status {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--green);
  background: rgba(16, 185, 129, 0.1);
  padding: 6px 12px;
  border-radius: 20px;
  text-align: center;
}

.rates-note {
  text-align: center;
  padding: 24px;
  font-size: 0.9rem;
  color: var(--gray-500);
}

/* Notice Section */
.notice-section {
  background: var(--gray-50);
  padding: 100px 0;
}

.notice-grid {
  display: grid;
  gap: 24px;
}

@media (min-width: 768px) {
  .notice-grid { grid-template-columns: repeat(3, 1fr); }
}

.notice-card {
  background: #fff;
  border-radius: 20px;
  padding: 28px;
}

.notice-card.can { border-left: 4px solid var(--green); }
.notice-card.special { border-left: 4px solid var(--yellow); }
.notice-card.no { border-left: 4px solid var(--red); }

.notice-card h4 {
  font-size: 1.05rem;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.notice-card.can h4 { color: var(--green); }
.notice-card.special h4 { color: var(--yellow); }
.notice-card.no h4 { color: var(--red); }

.notice-card li {
  font-size: 0.9rem;
  color: var(--gray-600);
  padding: 8px 0;
  border-bottom: 1px solid var(--gray-100);
}

.notice-card li:last-child { border-bottom: none; }

/* Contact Section */
.contact-section {
  background: linear-gradient(180deg, #fff 0%, var(--gray-50) 100%);
  padding: 100px 0;
}

.contact-grid {
  display: grid;
  gap: 24px;
}

@media (min-width: 768px) {
  .contact-grid { grid-template-columns: repeat(3, 1fr); }
}

.contact-card {
  background: #fff;
  border-radius: 20px;
  padding: 32px;
  text-align: center;
  border: 1px solid var(--gray-100);
  transition: all 0.3s;
}

.contact-card:hover {
  transform: translateY(-6px);
  box-shadow: var(--shadow-xl);
  border-color: var(--primary);
}

.contact-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(59, 130, 246, 0.05));
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  font-size: 1.6rem;
  color: var(--primary);
}

.contact-card h4 {
  font-size: 1.1rem;
  font-weight: 700;
  margin-bottom: 8px;
}

.contact-card p {
  font-size: 0.9rem;
  color: var(--gray-500);
  margin-bottom: 12px;
}

.contact-card a {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--primary);
}

/* Chat Widget */
.chat-widget {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 998;
}

.chat-btn {
  width: 60px;
  height: 60px;
  background: linear-gradient(135deg, var(--orange), #FB923C);
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.5rem;
  color: #fff;
  cursor: pointer;
  box-shadow: 0 8px 25px rgba(249, 115, 22, 0.4);
  transition: all 0.3s;
}

.chat-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 12px 35px rgba(249, 115, 22, 0.5);
}

.chat-btn i { transition: transform 0.3s; }
.chat-btn.open i { transform: rotate(90deg); }

.chat-panel {
  position: absolute;
  bottom: 80px;
  right: 0;
  width: 380px;
  height: 500px;
  background: #fff;
  border-radius: 20px;
  box-shadow: var(--shadow-xl);
  display: none;
  flex-direction: column;
  overflow: hidden;
}

.chat-panel.show { display: flex; }

.chat-header {
  background: linear-gradient(135deg, var(--primary), #3B82F6);
  color: #fff;
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.chat-header h4 {
  font-size: 1rem;
  font-weight: 700;
}

.chat-header-close {
  background: rgba(255,255,255,0.2);
  border: none;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  color: #fff;
  cursor: pointer;
  font-size: 1rem;
}

.chat-messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.chat-msg {
  max-width: 80%;
  padding: 14px 18px;
  border-radius: 18px;
  font-size: 0.925rem;
  line-height: 1.5;
}

.chat-msg.bot {
  background: var(--gray-100);
  align-self: flex-start;
  border-bottom-left-radius: 4px;
}

.chat-msg.user {
  background: var(--primary);
  color: #fff;
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}

.chat-input-area {
  padding: 16px;
  border-top: 1px solid var(--gray-100);
  display: flex;
  gap: 10px;
}

.chat-input-area input {
  flex: 1;
  height: 44px;
  padding: 0 16px;
  border: 1px solid var(--gray-200);
  border-radius: 22px;
  font-size: 0.9rem;
}

.chat-input-area input:focus {
  outline: none;
  border-color: var(--primary);
}

.chat-input-area button
