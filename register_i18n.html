<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="register.title">Register - CN2Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0066FF;
            --secondary: #00D4FF;
            --accent: #FF6B35;
            --text: #1a1a1a;
            --text-light: #666;
            --bg: #fff;
            --bg-light: #f8f9fa;
            --border: #e5e7eb;
            --success: #22c55e;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-wrapper {
            width: 100%;
            max-width: 500px;
        }

        .lang-selector {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .lang-btn {
            padding: 8px 16px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s;
        }

        .lang-btn.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,102,255,0.1);
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .register-header h1 {
            font-size: 24px;
            margin-bottom: 8px;
            data-i18n: "register.title";
        }

        .register-header p {
            color: var(--text-light);
            font-size: 14px;
            data-i18n: "register.subtitle";
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .country-code {
            position: absolute;
            left: 16px;
            font-weight: 600;
            color: var(--text-light);
            pointer-events: none;
            min-width: 50px;
        }

        .form-input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }

        .form-input.with-code {
            padding-left: 70px;
        }

        .country-select-wrapper {
            position: relative;
        }

        .country-select-btn {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 16px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: inherit;
            font-weight: 500;
        }

        .country-select-btn:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,102,255,0.1);
        }

        .country-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 4px;
        }

        .country-dropdown.show {
            display: block;
        }

        .country-option {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
            border-bottom: 1px solid var(--bg-light);
        }

        .country-option:last-child {
            border-bottom: none;
        }

        .country-option:hover {
            background: var(--bg-light);
        }

        .country-option.selected {
            background: rgba(0,102,255,0.05);
            color: var(--primary);
            font-weight: 600;
        }

        .country-name {
            flex: 1;
        }

        .country-code-display {
            color: var(--text-light);
            font-size: 13px;
            margin-left: 10px;
        }

        .form-error {
            color: var(--error);
            font-size: 13px;
            margin-top: 6px;
            display: none;
        }

        .form-error.show {
            display: block;
        }

        .form-input.error {
            border-color: var(--error);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 20px;
        }

        .checkbox-group input {
            margin-top: 4px;
            cursor: pointer;
        }

        .checkbox-group label {
            margin: 0;
            font-size: 13px;
            color: var(--text-light);
            cursor: pointer;
        }

        .checkbox-group a {
            color: var(--primary);
            text-decoration: none;
        }

        .checkbox-group a:hover {
            text-decoration: underline;
        }

        .register-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 16px;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,102,255,0.3);
        }

        .register-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: var(--text-light);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .google-btn {
            width: 100%;
            padding: 14px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
        }

        .google-btn:hover {
            background: var(--bg-light);
            border-color: var(--primary);
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-light);
        }

        .login-link a {
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .success-message {
            display: none;
            padding: 16px;
            background: rgba(34,197,94,0.1);
            border: 1px solid var(--success);
            border-radius: 10px;
            color: var(--success);
            margin-bottom: 20px;
            font-size: 14px;
        }

        .success-message.show {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            animation: loading 1.4s infinite;
        }

        .loading::after,
        .loading::before {
            content: '';
            display: inline-block;
            position: absolute;
            width: 4px;
            height: 4px;
            background: currentColor;
            border-radius: 50%;
            animation: loading 1.4s infinite;
        }

        .loading::before {
            margin-left: -8px;
            animation-delay: -0.7s;
        }

        .loading::after {
            margin-left: 8px;
            animation-delay: 0.7s;
        }

        @keyframes loading {
            0%, 80%, 100% { opacity: 0.5; }
            40% { opacity: 1; }
        }

        @media (max-width: 480px) {
            .register-container {
                padding: 24px;
            }

            .register-header h1 {
                font-size: 20px;
            }

            .lang-selector {
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="register-wrapper">
        <!-- 语言选择器 -->
        <div class="lang-selector">
            <button class="lang-btn active" data-lang="en">English</button>
            <button class="lang-btn" data-lang="zh">中文</button>
            <button class="lang-btn" data-lang="ja">日本語</button>
            <button class="lang-btn" data-lang="de">Deutsch</button>
            <button class="lang-btn" data-lang="fr">Français</button>
        </div>

        <div class="register-container">
            <div class="register-header">
                <div class="logo">CN2Global</div>
                <h1 data-i18n="register.title">Create Account</h1>
                <p data-i18n="register.subtitle">Create a CN2Global account for your country/region</p>
            </div>

            <div class="success-message" id="successMsg"></div>

            <form id="registerForm">
                <!-- 国家选择 -->
                <div class="form-group">
                    <label data-i18n="register.country">Select Country/Region</label>
                    <div class="country-select-wrapper">
                        <button type="button" class="country-select-btn" id="countryBtn">
                            <span id="countryDisplay">Select Country</span>
                            <span>▼</span>
                        </button>
                        <div class="country-dropdown" id="countryDropdown"></div>
                    </div>
                    <input type="hidden" id="selectedCountry" name="country" required>
                    <div class="form-error" id="countryError" data-i18n="register.error_phone">Please select a country</div>
                </div>

                <!-- 手机号码 -->
                <div class="form-group">
                    <label data-i18n="register.phone">Phone Number</label>
                    <div class="input-wrapper">
                        <span class="country-code" id="countryCodeDisplay">+86</span>
                        <input 
                            type="tel" 
                            class="form-input with-code" 
                            id="phone" 
                            name="phone"
                            data-i18n-placeholder="register.phone_placeholder"
                            placeholder="Enter your phone number"
                            required
                        >
                    </div>
                    <div class="form-error" id="phoneError" data-i18n="register.error_phone">Please enter a valid phone number</div>
                </div>

                <!-- 邮箱 -->
                <div class="form-group">
                    <label data-i18n="register.email">Email Address</label>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="email" 
                        name="email"
                        data-i18n-placeholder="register.email"
                        placeholder="Email address"
                    >
                    <div class="form-error" id="emailError" data-i18n="register.error_email">Please enter a valid email address</div>
                </div>

                <!-- 密码 -->
                <div class="form-group">
                    <label data-i18n="register.password">Password</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="password" 
                        name="password"
                        data-i18n-placeholder="register.password_placeholder"
                        placeholder="At least 8 characters"
                        required
                    >
                    <div class="form-error" id="passwordError" data-i18n="register.error_password">Password must be at least 8 characters</div>
                </div>

                <!-- 确认密码 -->
                <div class="form-group">
                    <label data-i18n="register.confirm_password">Confirm Password</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="confirmPassword" 
                        name="confirmPassword"
                        data-i18n-placeholder="register.password_placeholder"
                        placeholder="At least 8 characters"
                        required
                    >
                    <div class="form-error" id="confirmPasswordError">Passwords do not match</div>
                </div>

                <!-- 同意条款 -->
                <div class="checkbox-group">
                    <input type="checkbox" id="agreeTerms" name="agreeTerms" required>
                    <label for="agreeTerms">
                        <span data-i18n="register.agree_terms">I agree to the Terms of Service and Privacy Policy</span>
                    </label>
                </div>

                <!-- 注册按钮 -->
                <button type="submit" class="register-btn" id="registerBtn" data-i18n="register.register_btn">Register</button>

                <!-- 分割线 -->
                <div class="divider" data-i18n="register.or">or</div>

                <!-- Google 登录 -->
                <button type="button" class="google-btn" id="googleBtn">
                    <svg class="google-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                    </svg>
                    <span data-i18n="register.google_login">Sign up with Google</span>
                </button>
            </form>

            <!-- 登录链接 -->
            <div class="login-link">
                <span data-i18n="register.login_link">Already have an account? <a href="login.html">Login</a></span>
            </div>
        </div>
    </div>

    <script src="i18n.js"></script>
    <script>
        // 初始化
        let currentLang = getUserLanguage();
        let selectedCountryCode = 'CN';

        // 初始化国家列表
        function initCountryDropdown() {
            const dropdown = document.getElementById('countryDropdown');
            dropdown.innerHTML = '';

            Object.entries(countryData).forEach(([code, data]) => {
                const option = document.createElement('div');
                option.className = 'country-option';
                if (code === selectedCountryCode) option.classList.add('selected');
                option.innerHTML = `
                    <span class="country-name">${data.name}</span>
                    <span class="country-code-display">${data.code}</span>
                `;
                option.addEventListener('click', () => selectCountry(code, data));
                dropdown.appendChild(option);
            });
        }

        // 选择国家
        function selectCountry(code, data) {
            selectedCountryCode = code;
            document.getElementById('selectedCountry').value = code;
            document.getElementById('countryDisplay').textContent = data.name;
            document.getElementById('countryCodeDisplay').textContent = data.code;
            document.getElementById('countryDropdown').classList.remove('show');
            
            // 自动切换语言
            if (data.lang && translations[data.lang]) {
                setLanguage(data.lang);
                updateLanguageButtons(data.lang);
            }
        }

        // 国家按钮点击
        document.getElementById('countryBtn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('countryDropdown').classList.toggle('show');
        });

        // 点击外部关闭下拉菜单
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.country-select-wrapper')) {
                document.getElementById('countryDropdown').classList.remove('show');
            }
        });

        // 语言按钮
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');
                setLanguage(lang);
                updateLanguageButtons(lang);
            });
        });

        function updateLanguageButtons(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-lang') === lang);
            });
        }

        // 表单验证
        function validatePhone(phone) {
            return phone.length >= 7 && phone.length <= 15 && /^\d+$/.test(phone);
        }

        function validateEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }

        function validatePassword(password) {
            return password.length >= 8;
        }

        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreeTerms = document.getElementById('agreeTerms').checked;

            let hasError = false;

            // 验证国家
            if (!selectedCountryCode) {
                document.getElementById('countryError').classList.add('show');
                hasError = true;
            } else {
                document.getElementById('countryError').classList.remove('show');
            }

            // 验证手机
            if (!validatePhone(phone)) {
                document.getElementById('phoneError').classList.add('show');
                document.getElementById('phone').classList.add('error');
                hasError = true;
            } else {
                document.getElementById('phoneError').classList.remove('show');
                document.getElementById('phone').classList.remove('error');
            }

            // 验证邮箱
            if (email && !validateEmail(email)) {
                document.getElementById('emailError').classList.add('show');
                document.getElementById('email').classList.add('error');
                hasError = true;
            } else {
                document.getElementById('emailError').classList.remove('show');
                document.getElementById('email').classList.remove('error');
            }

            // 验证密码
            if (!validatePassword(password)) {
                document.getElementById('passwordError').classList.add('show');
                document.getElementById('password').classList.add('error');
                hasError = true;
            } else {
                document.getElementById('passwordError').classList.remove('show');
                document.getElementById('password').classList.remove('error');
            }

            // 验证密码匹配
            if (password !== confirmPassword) {
                document.getElementById('confirmPasswordError').classList.add('show');
                document.getElementById('confirmPassword').classList.add('error');
                hasError = true;
            } else {
                document.getElementById('confirmPasswordError').classList.remove('show');
                document.getElementById('confirmPassword').classList.remove('error');
            }

            // 验证同意条款
            if (!agreeTerms) {
                alert(t('register.agree_terms', currentLang));
                hasError = true;
            }

            if (hasError) return;

            // 提交注册
            const registerBtn = document.getElementById('registerBtn');
            registerBtn.disabled = true;
            registerBtn.textContent = t('register.sending_code', currentLang);

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        country: selectedCountryCode,
                        phone: countryData[selectedCountryCode].code + phone,
                        email: email || null,
                        password: password,
                        language: currentLang
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    document.getElementById('successMsg').textContent = t('register.success', currentLang);
                    document.getElementById('successMsg').classList.add('show');
                    document.getElementById('registerForm').reset();
                    
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    alert(data.message || t('register.error_phone', currentLang));
                }
            } catch (error) {
                console.error('Registration error:', error);
                alert('Registration failed. Please try again.');
            } finally {
                registerBtn.disabled = false;
                registerBtn.textContent = t('register.register_btn', currentLang);
            }
        });

        // Google 登录
        document.getElementById('googleBtn').addEventListener('click', (e) => {
            e.preventDefault();
            // Google OAuth 流程
            window.location.href = '/api/auth/google';
        });

        // 初始化
        setLanguage(currentLang);
        updateLanguageButtons(currentLang);
        initCountryDropdown();
        selectCountry('CN', countryData['CN']);
    </script>
</body>
</html>
